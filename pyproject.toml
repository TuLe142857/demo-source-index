[tool.uv.workspace]
members = [
    "demo-ast",
    "demo_vectordb",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.15.20",
]

# ========================================================================
#                   RUFF CONFIGURATION
# - This is an default config, any module can extends this
# and add custom config by:
#       [tool.ruff]
#       extend = "../pyproject.toml" # path to this config file
#       # ... override custom config here
#
# - Docs: https://docs.astral.sh/ruff/settings
# ========================================================================
[tool.ruff]
target-version = "py313"
line-length = 88
indent-width = 4
exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pypackages__",
    "build",
    "dist",
    "venv",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint]
select = [
    "E",
    "W",
    "I",
    "F"
]

[tool.ruff.lint.isort]